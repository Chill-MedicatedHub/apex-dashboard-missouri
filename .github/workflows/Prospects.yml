name: Build Prospects (Missouri)
on:
  schedule:
    - cron: '30 6 * * 1'    # weekly, Monday 06:30 UTC — the state list changes slowly
  workflow_dispatch:          # manual "Run workflow" button
permissions:
  contents: write
# If your MO sales-scraper workflow uses a concurrency group, set this to match
# so the two never push at the same time. Otherwise the retry-push below handles it.
concurrency:
  group: mo-prospects
  cancel-in-progress: false
jobs:
  prospects:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests openpyxl
      - name: Build prospects.json
        env:
          PYTHONUNBUFFERED: '1'
        run: python make_prospects_mo.py
      - name: Commit prospects.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage FIRST, then check the staged diff — plain `git diff` ignores
          # untracked files, so a brand-new prospects.json would look like "no changes".
          git add prospects.json
          if git diff --cached --quiet -- prospects.json; then
            echo "No changes to commit."
            exit 0
          fi
          cp prospects.json /tmp/prospects.json
          for i in 1 2 3 4 5; do
            git add prospects.json
            git commit -m "Auto-update prospects.json [skip ci]" || true
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push $i failed (remote moved); resyncing and reapplying..."
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/prospects.json prospects.json
            sleep 3
          done
          echo "ERROR: push failed after 5 attempts."
          exit 1
